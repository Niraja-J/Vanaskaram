<!DOCTYPE html>
<html lang='en'>
<head>
	<meta charset='UTF-8'>
	<meta name='viewport' content='width=device-width, initial-scale=1.0'>
	<meta name='description' content='Vanaskaram About Us'>
	<title> About Us</title>
	<link rel='stylesheet' href='vstyles.css'>
</head>
<body>

<header id='header'>
	<div id='logo'>
	<img src=logo.jpeg alt text='Vanaskaram Logo'>
	</div>

</header>

<main>

<section id="signup">

    <h1>Create Your Account</h1>

    <p>Join Vanaskaram and experience authentic regional flavours.</p>

<form>

<div class="form-group">

<label for="name">Full Name *</label>

<input type="text" id="name" required>


<label for="phno">Phone Number *</label>

<input type="tel" id="phno" required>

<label for="address">Address *</label>

<input type="text" id="address" required>

<label for="pincode">Pincode *</label>

<input type="number" id="pincode" required [0-9]{6}>

<label for="email">Email *</label>

<input type="email" id="email" required>

<label for="pass">Password</label>

<input type="password" id="pass">

<label for="confirmpass">Confirm Password</label>

<input type="password" id="confirmpass">

</div>

<button> Sign Up </button>
</form>
<p>

        Already have an account?

        <a href="login.html">
            Login
        </a>
</p>

</section>

</main>
</body>

</html>
